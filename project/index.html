<!DOCTYPE html>
<html>
<head>
    <title>GraphRAG Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #e4ecf5);
        }

        .main-card {
            border-radius: 16px;
            border: none;
        }

        .card {
            border-radius: 14px;
            border: none;
        }

        .header-title {
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 9999;
        }

        #overlay p {
            margin-top: 15px;
            font-size: 18px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status-box {
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- Overlay Spinner -->
<div id="overlay">
    <div class="spinner-border text-light" style="width:4rem;height:4rem;"></div>
    <p id="overlayText">Processing...</p>
</div>

<div class="container mt-5 mb-5">

    <div class="text-center mb-4">
        <h2 class="header-title">🚀 GraphRAG Web Dashboard</h2>
        <p class="text-muted">Upload → Index → Query (Local / Global / Drift)</p>
    </div>

    <!-- Upload Card -->
    <div class="card shadow-sm p-4 mb-4 main-card">
        <h5><i class="bi bi-upload"></i> Upload Document</h5>
        <input type="file" id="fileInput" class="form-control mb-3">
        <button class="btn btn-primary" onclick="uploadFile()">
            <i class="bi bi-cloud-upload"></i> Upload
        </button>
        <div id="uploadMsg" class="mt-3 status-box"></div>
    </div>

    <!-- Index Card -->
    <div class="card shadow-sm p-4 mb-4 main-card">
        <h5><i class="bi bi-gear"></i> Create Index</h5>
        <button class="btn btn-warning" id="indexBtn" onclick="runIndex()">
            <i class="bi bi-play-circle"></i> Run Index
        </button>
        <div id="indexMsg" class="mt-3 status-box"></div>
    </div>

    <!-- Query Card -->
    <div class="card shadow-sm p-4 main-card">
        <h5><i class="bi bi-search"></i> Query Graph</h5>

        <input type="text" id="question" class="form-control mb-3"
               placeholder="Ask your question...">

        <select id="mode" class="form-select mb-3">
            <option value="local">Local Search</option>
            <option value="global">Global Search</option>
            <option value="drift">Drift Search</option>
        </select>

        <button class="btn btn-success" id="queryBtn" onclick="runQuery()">
            <i class="bi bi-send"></i> Submit Query
        </button>

        <div class="mt-4">
            <h6>Answer:</h6>
            <pre id="answer" class="bg-light p-3 rounded border"></pre>
        </div>
    </div>

</div>

<script>

function toggleUI(disabled) {
    document.getElementById("fileInput").disabled = disabled;
    document.getElementById("indexBtn").disabled = disabled;
    document.getElementById("queryBtn").disabled = disabled;
    document.getElementById("question").disabled = disabled;
    document.getElementById("mode").disabled = disabled;
}

function showOverlay(show, text="Processing...") {
    document.getElementById("overlayText").innerText = text;
    document.getElementById("overlay").style.display = show ? "flex" : "none";
}

function showStatus(elementId, message, type="info") {
    const el = document.getElementById(elementId);
    el.innerHTML = `<div class="alert alert-${type} mt-2">${message}</div>`;
}

async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    showOverlay(true, "Uploading file...");
    toggleUI(true);

    const res = await fetch("/upload/", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    showOverlay(false);
    toggleUI(false);

    if (data.message) {
        showStatus("uploadMsg", data.message, "success");
    } else {
        showStatus("uploadMsg", data.error, "danger");
    }
}

async function runIndex() {

    showOverlay(true, "Indexing in progress... This may take a few minutes.");
    toggleUI(true);
    showStatus("indexMsg", "Indexing started...", "info");

    const res = await fetch("/index/", { method: "POST" });
    const data = await res.json();

    showOverlay(false);
    toggleUI(false);

    if (data.message) {
        showStatus("indexMsg", data.message, "success");
    } else {
        showStatus("indexMsg", data.error, "danger");
    }
}

async function runQuery() {

    const question = document.getElementById("question").value;
    const mode = document.getElementById("mode").value;

    if (!question) return;

    const formData = new FormData();
    formData.append("question", question);
    formData.append("mode", mode);

    showOverlay(true, "Generating answer...");
    toggleUI(true);

    const res = await fetch("/query/", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    showOverlay(false);
    toggleUI(false);

    if (data.answer) {
        document.getElementById("answer").innerText = data.answer;
    } else {
        document.getElementById("answer").innerText = data.error;
    }
}

</script>

</body>
</html>
